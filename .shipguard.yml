# ShipGuard configuration
# See: https://github.com/DevOpsCelstn/shipguard

severity_threshold: medium

exclude_paths:
  - ".venv/**"
  - ".pytest_cache/**"
  - ".ruff_cache/**"
  - "htmlcov/**"
  - "archive/**"
  # These test files intentionally contain fake credential patterns (AWS key
  # fixtures, PEM blocks) to verify the export-scrub and redact features.
  # They do not contain real secrets.
  - "tests/unit/test_paperclip_export_scrub.py"
  - "tests/unit/test_redact.py"

disable_rules:
  # PY-007: false positive — f.write() in test_changelog_append_only.py triggers
  # sql-string-format rule; superharness has no SQL queries
  - PY-007
  # PY-006: false positive in tests/e2e/test_dashboard_bugs.py — "test-token" is a
  # dummy fixture value used to initialize a test HTTP server, not a real credential
  - PY-006
  # PY-012: false positive — all NamedTemporaryFile(delete=False) usages in tests
  # are paired with explicit try/finally: os.unlink() cleanup; the rule does not
  # look past the delete=False call to the surrounding cleanup block
  - PY-012
  # SC-004: false positive — scans .superharness/.gitignore (a subdirectory gitignore
  # for runtime artifacts) and flags missing secret patterns; those patterns are
  # already present in the root .gitignore
  - SC-004
  # PII-004: false positive — the only matches are "t@t.com", a throwaway
  # git config user.email used to make commits inside temp repos in
  # tests/unit/test_checkpoint.py, test_onboard_quicksetup.py and
  # test_sections_git.py. Not customer PII.
  - PII-004

custom_rules_dirs: []

use_rust_secrets: false

# Personal identifiers and workspace names that must never appear in source code.
# Used by /security-pipeline (step 6) and /ship (step 9) to catch PII leaks.
# Add project-specific terms here — standard patterns (/Users/<name>/, /home/<name>/)
# are checked automatically.
#
# The maintainer's real username is intentionally not hardcoded here — that
# literal was itself a personal-data finding in the 2026-07-20 job-ready audit
# (docs/audits/2026-07-20-job-ready-v2.md). Set SUPERHARNESS_MAINTAINER_USERNAME
# in your local environment if a scan needs to check for it specifically.
# Note: as installed (shipguard 0.5.2), this key is not actually read by the
# scanner — grepping the installed package for `sanitize_blocklist` finds no
# matches, so this entry is presently inert either way. The live, CI-enforced
# guard against this literal reappearing in a tracked file is
# tests/unit/test_no_tracked_personal_data.py, not this blocklist.
sanitize_blocklist:
  - "${SUPERHARNESS_MAINTAINER_USERNAME}"
  - "DevOpsCelstn"
