name: Release

# Fires only when a v* tag is pushed explicitly (via /ship-release or git push --tags).
# Merging PRs to main never triggers a release.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create releases and tags
  actions: write    # needed to dispatch publish.yml via workflow_dispatch

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: tag_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog section for this version
        id: changelog
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the block between ## [VERSION] and the next ## [
          NOTES=$(python3 -c "
          import re, pathlib
          text = pathlib.Path('CHANGELOG.md').read_text()
          pattern = rf'## \[{re.escape(\"$VERSION\")}\][^\n]*\n(.*?)(?=\n## \[|\Z)'
          m = re.search(pattern, text, re.DOTALL)
          print(m.group(1).strip() if m else 'See CHANGELOG.md for details.')
          ")
          # Write to file to handle multiline safely
          echo "$NOTES" > /tmp/release_notes.txt
          echo "notes_file=/tmp/release_notes.txt" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "superharness ${{ steps.version.outputs.tag }}" \
            --notes-file "${{ steps.changelog.outputs.notes_file }}" \
            --latest

      # GitHub won't trigger publish.yml from a release created by GITHUB_TOKEN,
      # so we dispatch it explicitly via workflow_dispatch.
      - name: Trigger publish workflow
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run publish.yml \
            --ref "${{ steps.version.outputs.tag }}"
