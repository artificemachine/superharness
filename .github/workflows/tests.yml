name: Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  shell-tests:
    name: Shell Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0

      - name: Changelog append-only guard
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          else
            BASE_REF="${{ github.event.before }}"
          fi
          if [ -z "$BASE_REF" ] || [ "$BASE_REF" = "0000000000000000000000000000000000000000" ]; then
            echo "No usable base ref for append-only check; skipping."
            exit 0
          fi
          bash src/superharness/scripts/check-changelog-append-only.sh --base-ref "$BASE_REF" --head-ref HEAD

      - name: Entrypoint guard
        run: src/superharness/scripts/check-shell-entrypoints.sh

      - name: Syntax checks
        run: |
          # Shell syntax for entrypoints/hooks is enforced by src/superharness/scripts/check-shell-entrypoints.sh.
          python3 -m py_compile \
            src/superharness/engine/inbox.py \
            src/superharness/engine/contract.py \
            src/superharness/commands/init_project.py \
            src/superharness/commands/heartbeat.py \
            src/superharness/commands/demo.py \
            src/superharness/commands/watcher_worker.py

      - name: Script smoke tests
        run: |
          while IFS= read -r entrypoint; do
            [ -n "$entrypoint" ] || continue
            bash "$entrypoint" --help
          done < <(bash src/superharness/scripts/check-shell-entrypoints.sh --list-entrypoints)
          HOME="$(mktemp -d)" bash adapters/claude-code/install.sh --dry-run
          PYTHONPATH=src python3 -m superharness.commands.init_project --dry-run "CI Smoke" "Bash" "active"

  smoke-tests:
    name: Smoke Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest pytest-cov pyyaml click ruamel.yaml

      - name: Run smoke tests
        run: python3 -m pytest tests/test_smoke.py -q
        env:
          PYTHONPATH: src

  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # 30, not 20: the Windows leg measured 13m49s and 18m45s on two consecutive
    # runs of near-identical trees, and the 18m45s run completed with zero
    # failures but was killed at 20m10s wall-clock, counting setup. The suite is
    # not hanging; the ceiling was simply below the runner's variance. A genuine
    # hang is still caught here, and this is the only backstop on Windows because
    # the per-test pytest-timeout is disabled below.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest pytest-cov pytest-timeout pyyaml click ruamel.yaml && pip install -e .

      - name: Run unit tests (Linux / macOS)
        if: runner.os != 'Windows'
        run: python3 -m pytest tests/unit -q --timeout=120 --full-trace --cov=superharness --cov-fail-under=53
        env:
          PYTHONPATH: src
          PYTHONUTF8: "1"

      - name: Run unit tests (Windows — no per-test timeout)
        if: runner.os == 'Windows'
        # pytest-timeout creates one threading.Timer (OS thread) per test.
        # After ~1900 cumulative thread creations the Windows scheduler saturates
        # and Timer.start() blocks at _started.wait() for the full timeout interval
        # before firing — causing a spurious KeyboardInterrupt in a later test.
        # The job-level timeout-minutes above still catches any genuinely hung test.
        run: python3 -m pytest tests/unit -q --full-trace --cov=superharness --cov-fail-under=53
        env:
          PYTHONPATH: src
          PYTHONUTF8: "1"

  integration-tests:
    name: Integration Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest pytest-cov pyyaml click ruamel.yaml && pip install -e .

      - name: Run integration tests
        run: python3 -m pytest tests/integration -q
        env:
          PYTHONPATH: src

  e2e-tests:
    name: E2E Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest pytest-cov pyyaml click ruamel.yaml && pip install -e .

      - name: Run e2e tests
        run: python3 -m pytest tests/e2e -q
        env:
          PYTHONPATH: src
          PYTHONUTF8: "1"

  other-tests:
    name: Other Tests (chaos/contract/engine/perf/smoke-dir/state-machine/root)
    # 2026-07-21 portfolio-ready audit: tests/unit, tests/integration, tests/e2e,
    # and tests/test_smoke.py were the only paths any workflow ever invoked —
    # tests/chaos, tests/contract, tests/engine, tests/perf, tests/smoke/ (the
    # directory, distinct from the tests/test_smoke.py file above), and 19 loose
    # top-level test files (~1,134 tests, ~20% of the suite) never ran in CI.
    # This job closes that gap. A real regression (dashboard read-auth, PR #58)
    # and 2 real bugs sat undetected here until a manual fresh-clone run found
    # them — see docs/audits/2026-07-21-portfolio-ready.md Stage 4.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest pytest-cov pyyaml click ruamel.yaml && pip install -e .

      - name: Run everything not already covered by the other jobs
        run: python3 -m pytest tests/ -q --ignore=tests/unit --ignore=tests/integration --ignore=tests/e2e --ignore=tests/test_smoke.py
        env:
          PYTHONPATH: src
          PYTHONUTF8: "1"

  qa-gate:
    name: QA Gate
    runs-on: ubuntu-latest
    needs:
      - shell-tests
      - smoke-tests
      - unit-tests
      - integration-tests
      - e2e-tests
      - other-tests
    if: always()
    steps:
      - name: Verify all quality layers passed
        env:
          SHELL_TESTS: ${{ needs.shell-tests.result }}
          SMOKE_TESTS: ${{ needs.smoke-tests.result }}
          UNIT_TESTS: ${{ needs.unit-tests.result }}
          INTEGRATION_TESTS: ${{ needs.integration-tests.result }}
          E2E_TESTS: ${{ needs.e2e-tests.result }}
          OTHER_TESTS: ${{ needs.other-tests.result }}
        run: |
          failures=0
          echo "shell-tests => $SHELL_TESTS"
          echo "smoke-tests => $SMOKE_TESTS"
          echo "unit-tests => $UNIT_TESTS"
          echo "integration-tests => $INTEGRATION_TESTS"
          echo "e2e-tests => $E2E_TESTS"
          echo "other-tests => $OTHER_TESTS"
          [ "$SHELL_TESTS" = "success" ] || failures=1
          [ "$SMOKE_TESTS" = "success" ] || failures=1
          [ "$UNIT_TESTS" = "success" ] || failures=1
          [ "$INTEGRATION_TESTS" = "success" ] || failures=1
          [ "$E2E_TESTS" = "success" ] || failures=1
          [ "$OTHER_TESTS" = "success" ] || failures=1
          if [ "$failures" -ne 0 ]; then
            echo "QA Gate failed: one or more required test layers did not pass." >&2
            exit 1
          fi
          echo "QA Gate passed: all required test layers succeeded."
