name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  shell-tests:
    name: Shell Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Entrypoint guard
        run: scripts/check-shell-entrypoints.sh

      - name: Syntax checks
        run: |
          # Shell syntax for entrypoints/hooks is enforced by scripts/check-shell-entrypoints.sh.
          ruby -c scripts/inbox-yaml.rb

      - name: Script smoke tests
        run: |
          bash init-project.sh --help
          bash init-project.sh --dry-run "CI Smoke" "Bash" "active"
          bash adapters/claude-code/install.sh --help
          bash scripts/check-contract-hygiene.sh --help
          bash scripts/delegate-to-claude.sh --help
          bash scripts/delegate-to-codex.sh --help
          bash scripts/inbox-enqueue.sh --help
          bash scripts/inbox-dispatch.sh --help
          bash scripts/inbox-normalize.sh --help
          bash scripts/inbox-watch.sh --help
          bash scripts/install-launchd-inbox-watcher.sh --help
          bash scripts/ensure-launchd-inbox-watcher.sh --help
          bash scripts/uninstall-launchd-inbox-watcher.sh --help
          HOME="$(mktemp -d)" bash adapters/claude-code/install.sh --dry-run

      - name: Install pytest
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest

      - name: Run pytest suite
        run: PYTHONPATH=. python3 -m pytest tests -q
