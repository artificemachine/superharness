name: Security

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  shipguard:
    name: ShipGuard Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Install ShipGuard
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "shipguard==0.2.0"

      - name: Run ShipGuard
        run: |
          shipguard scan . --format terminal > shipguard.txt
          sed -n '1,260p' shipguard.txt

      - name: Install pip-audit
        run: python3 -m pip install "pip-audit==2.7.3"

      - name: Run pip-audit
        run: pip-audit -r requirements.txt --format json --output pip-audit.json
        continue-on-error: true

      - name: Upload report artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: shipguard-report
          path: |
            shipguard.txt
            pip-audit.json
