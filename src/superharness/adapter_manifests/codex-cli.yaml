name: codex-cli
version: "1"
description: "Codex CLI — OpenAI's coding agent (native adapter)"
type: native
launcher_script: delegate-to-codex.sh
capabilities:
  - code_generation
  - file_editing
  - test_execution
  - multi_file_refactor
# Each tier carries the concrete model id and a human-facing label. Update
# both together when bumping a model.
model_tiers:
  # mini — cheap + fast codex-optimized batch tier (matches Haiku role).
  # standard — codex-optimized daily workhorse for coding tasks.
  # max — latest frontier model for the hardest reasoning work.
  mini:     { id: gpt-5.1-codex-mini, label: "GPT-5.1 Codex mini" }
  standard: { id: gpt-5.3-codex,      label: "GPT-5.3 Codex"      }
  max:      { id: gpt-5.4,            label: "GPT-5.4"            }
requires:
  bin: codex
  env: []
validation:
  check_bin: true
  check_env: false
