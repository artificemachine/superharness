name: codex-cli
version: "1"
description: "Codex CLI — OpenAI's coding agent (native adapter)"
type: native
launcher_script: delegate-to-codex.sh
capabilities:
  - code_generation
  - file_editing
  - test_execution
  - multi_file_refactor
supports_effort: true  # maps to -c model_reasoning_effort= (max→xhigh)
# Each tier carries the concrete model id and a human-facing label. Update
# both together when bumping a model.
model_tiers:
  mini:
    versions:
      "*": { id: gpt-5.1-codex-mini, label: "GPT-5.1 Codex mini" }
  standard:
    versions:
      "*": { id: gpt-5.3-codex,      label: "GPT-5.3 Codex"      }
  max:
    versions:
      "*": { id: gpt-5.5,            label: "GPT-5.5"            }
requires:
  bin: codex
  env: []
validation:
  check_bin: true
  check_env: false
