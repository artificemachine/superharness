name: claude-code
version: "1"
description: "Claude Code — Anthropic's AI coding agent (native adapter)"
type: native
launcher_script: delegate-to-claude.sh
capabilities:
  - code_generation
  - file_editing
  - test_execution
  - multi_file_refactor
# Each tier carries the concrete model id (used by SDKs / API calls) and a
# human-facing label (rendered by Morpheme and other UI consumers).
# Update both fields together when bumping a model.
model_tiers:
  mini:     { id: claude-haiku-4-5-20251001, label: "Haiku 4.5"  }
  standard: { id: claude-sonnet-4-6,         label: "Sonnet 4.6" }
  max:      { id: claude-opus-4-6,           label: "Opus 4.6"   }
requires:
  bin: claude
  env: []
validation:
  check_bin: true
  check_env: false
