name: claude-code
version: "1"
description: "Claude Code — Anthropic's AI coding agent (native adapter)"
type: native
launcher_script: delegate-to-claude.sh
capabilities:
  - code_generation
  - file_editing
  - test_execution
  - multi_file_refactor
supports_effort: true  # --effort low/medium/high passed to claude CLI
# model_tiers uses versioned entries: each tier has a `versions` map.
# The `"*"` key is the default (resolved when no version is pinned).
# EFFORT_TO_TIER_VERSION in engine/taxonomy.py drives effort→tier+version routing.
model_tiers:
  mini:
    versions:
      "*": { id: claude-haiku-4-5-20251001, label: "Haiku 4.5" }
  standard:
    versions:
      "*":   { id: claude-sonnet-4-6, label: "Sonnet 4.6" }
      "4.6": { id: claude-sonnet-4-6, label: "Sonnet 4.6" }
      "4.5": { id: claude-sonnet-4-5, label: "Sonnet 4.5" }
  max:
    versions:
      "*":   { id: claude-opus-4-7,   label: "Opus 4.7" }
      "4.7": { id: claude-opus-4-7,   label: "Opus 4.7" }
      "4.6": { id: claude-opus-4-7,   label: "Opus 4.7" }  # 4.6 alias — same cost
  max-1m:
    versions:
      "*": { id: "claude-opus-4-7[1m]", label: "Opus 4.7 (1M)" }
requires:
  bin: claude
  env: []
validation:
  check_bin: true
  check_env: false
