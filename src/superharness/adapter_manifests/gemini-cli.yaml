name: gemini-cli
version: "1"
description: "Gemini CLI — Google's AI coding agent (simulated via gemini command)"
type: native
launcher_script: delegate-to-gemini.sh
capabilities:
  - code_generation
  - file_editing
  - test_execution
supports_effort: false  # no --effort or --thinking-budget in gemini CLI
model_tiers:
  mini:
    versions:
      "*": { id: gemini-2.5-flash, label: "Gemini 2.5 Flash" }
  standard:
    versions:
      "*": { id: gemini-2.5-pro, label: "Gemini 2.5 Pro" }
  max:
    versions:
      "*": { id: gemini-3.1-pro-preview, label: "Gemini 3.1 Pro" }
requires:
  bin: gemini
  env: []
validation:
  check_bin: false # Don't block if not installed yet
  check_env: false
