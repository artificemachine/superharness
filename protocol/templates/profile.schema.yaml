# profile.schema.yaml — Schema for .superharness/profile.yaml
#
# Every superharness-initialized project MAY have a profile.yaml.
# If present, other scripts read it to adapt behavior.
# If absent, scripts fall back to defaults (approval-gated, no primary agent).
#
# This file documents the expected shape. It is not enforced programmatically
# (yet) — it's a contract between the installing agent and the runtime scripts.

schema_version: 1

fields:
  project_name:
    type: string
    required: true
    description: >
      Human-readable project name. Used by init to populate contract.yaml and
      ledger headers. Falls back to directory basename if missing.

  created:
    type: date          # YYYY-MM-DD
    required: true
    description: Date the profile was generated.

  autonomy:
    type: enum
    required: true
    values:
      - autonomous       # No confirmation gates. Agents act freely.
      - supervised       # Non-interactive mode on, but no permission skip.
      - approval-gated   # All confirmation gates active. Default if missing.
    description: >
      Controls how much human oversight agents require.
      Maps to SUPERHARNESS_CONFIRM_NON_INTERACTIVE and
      SUPERHARNESS_CONFIRM_SKIP_PERMISSIONS environment variables.

  primary_agent:
    type: enum
    required: true
    values:
      - claude-code
      - codex-cli
    description: >
      The default agent for new tasks when no --owner is specified.
      Set to whichever agent the user primarily works with.

  stack:
    type: string
    required: true
    description: >
      Slash-separated tech stack detected from project files.
      Example: "Python/Docker/Terraform", "Node/TypeScript", "Ruby/Rails".

  repo:
    type: enum
    required: false
    values: [github, gitlab, bitbucket, other]
    default: other
    description: Git hosting platform, detected from git remote URL.

  ci:
    type: enum
    required: false
    values: [github-actions, gitlab-ci, jenkins, circleci, none]
    default: none
    description: CI system detected from config files in the project.

  team_size:
    type: enum
    required: false
    values:
      - solo             # 1 contributor in last 90 days
      - small            # 2-5 contributors
      - team             # 6+ contributors
    default: solo
    description: >
      Estimated from git log. Affects default behavior:
      solo → simpler contract-today output.
      team → includes delegation suggestions.

  existing_harness:
    type: list
    required: false
    items:
      type: enum
      values: [claude-md, agents-md, cursor-rules, copilot-instructions]
    default: []
    description: >
      Pre-existing AI agent configuration files found in the project.
      Informational — init skips writing files that already exist.

  watcher:
    type: boolean
    required: false
    default: false
    description: >
      Whether a background watcher was configured during install.
      true = launchd (macOS) or systemd (Linux) watcher is active.

# --- Behavioral mappings ---
#
# How profile.yaml values affect superharness runtime:
#
# autonomy: autonomous
#   → delegate.sh sets SUPERHARNESS_CONFIRM_NON_INTERACTIVE=YES
#   → delegate.sh sets SUPERHARNESS_CONFIRM_SKIP_PERMISSIONS=YES
#
# autonomy: supervised
#   → delegate.sh sets SUPERHARNESS_CONFIRM_NON_INTERACTIVE=YES
#   → SUPERHARNESS_CONFIRM_SKIP_PERMISSIONS unset (agent explains, then acts)
#
# autonomy: approval-gated
#   → No env vars set (all gates active, agent waits for approval)
#
# primary_agent: claude-code
#   → task.sh defaults --owner to claude-code when not specified
#   → contract-today.sh highlights tasks owned by claude-code
#
# team_size: solo
#   → contract-today.sh uses compact output (no delegation column)
#
# team_size: small | team
#   → contract-today.sh shows owner column and suggests delegation
