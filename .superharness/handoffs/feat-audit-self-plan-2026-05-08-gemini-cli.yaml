task: feat-audit-self
phase: plan
status: plan_proposed
from: gemini-cli
to: owner
date: 2026-05-08T00:00:00Z
plan: |
  This task modernizes the project's internal validation and auditing tools, removing residual dependencies on stale YAML files. Specifically, 'engine/validate.py' (used by 'shux hygiene') and 'engine/inbox.py' still read 'contract.yaml' and 'inbox.yaml' via 'yaml.safe_load', undercutting the SQLite-only architecture.
  
  The approach is to refactor these modules to use 'state_reader' and DAO APIs for SQLite state, and apply Pydantic models for validation instead of raw dict manipulation. We will also correct the 'auto_dispatch.py' signature mismatch when calling 'model_router.classify_task'.
tdd:
  red: |
    - tests/unit/test_hygiene_sqlite.py: assert validation works against SQLite-only state.
    - tests/unit/test_dispatch_pending_bugs.py: assert classify_task signature mismatch fix.
  green: |
    - Update engine/validate.py and engine/inbox.py to use state_reader.
    - Fix auto_dispatch.py _classify_task argument passing.
  refactor: "Remove redundant yaml.safe_load imports and dead code in validation modules."
risks: |
  - Potential breakage of external scripts still relying on YAML snapshots for hygiene checks.
  - Ensuring tests run correctly without YAML fixtures.
