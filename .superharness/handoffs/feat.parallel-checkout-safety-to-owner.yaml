summary: |
  Parallel checkout safety implemented via TDD. All 5 acceptance criteria met.
  31 new concurrency-focused regression tests; 112 related tests pass.

outcomes:
  - title: Atomic claim() operation
    detail: |
      Added claim(file, now, target=None, contract_file=None) to inbox.py.
      Does next_pending + launch atomically under a single fcntl.flock hold.
      Eliminates the read-then-claim race window where two concurrent dispatchers
      could select the same pending item. Second caller gets empty output (nothing
      to claim) after first claims. CLI: `inbox claim --file F --now N [--to T]
      [--contract C]`.

  - title: Dependency-aware scheduling
    detail: |
      Added _deps_satisfied(contract_file, task_id) -> bool. Reads contract.yaml,
      resolves blocked_by (string, comma-list, or YAML list), returns False only
      when at least one dependency task is not done. Fails open (True) on read
      errors or missing contract. next_pending() gains optional contract_file=
      parameter — when provided, skips items whose contract task has unresolved
      deps. claim() also applies the same filter atomically.

  - title: Stale lock recovery (tested)
    detail: |
      Existing _MkdirLock orphan detection (dead PID auto-break) and age-based
      stale-lock recovery are now covered by explicit regression tests. Added
      tests for: dead-PID lock auto-recovered, no-PID age-based auto-recovered,
      alive-PID lock respected. recover_launched() stale retry/fail exhausted
      logic also directly tested.

  - title: Single-agent flow backward compat (tested)
    detail: |
      next_pending() without contract_file behaves exactly as before (backward
      compatible). launch() CAS semantics unchanged. enqueue() duplicate rejection
      unchanged. All 26 pre-existing inbox tests continue to pass.

  - title: delegate.py ctx bug fix
    detail: |
      Fixed UnboundLocalError in delegate.py line 823 where _build_context_hint()
      was called with `ctx` (discussion context var) in the non-discussion else
      branch. Changed to pass `task_obj or {}` instead. This was causing
      test_dispatch_picks_next_pending to fail.

