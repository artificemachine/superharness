# ── Outcomes ───────────────────────────────────────────────────────────────────

outcomes:
  - SDK v1 public interface (sdk.py) exposes a stable, documented contract for
    extension authors including LIFECYCLE_EVENTS, CURRENT_SCHEMA_VERSION,
    ModuleManifest, HookConfig, ManifestValidationError, validate_manifest,
    register_action, run_hooks, load_modules, and module management helpers.

  - Pydantic-based manifest validation (validator.py) enforces schema_version,
    known lifecycle hook names, and required 'action' fields on every hook.
    ManifestValidationError carries module_name and a structured errors list.

  - Loader (loader.py) validates every YAML manifest before accepting it.
    Invalid manifests are skipped with a WARNING log; valid neighbours are
    unaffected.  Five loader tests pass (test_module_loader.py).

  - Runner (runner.py) fires lifecycle hooks for on_close, on_verify,
    on_continue, on_delegate, on_watcher_tick.  Failures in individual module
    actions are isolated and logged; they do not propagate to callers.
    Seven runner tests pass (test_module_runner.py).

  - "Two example modules added to module_templates/examples/:
      hello-world.yaml (minimal single-hook on_close) and
      task-logger.yaml (multi-hook on_close + on_verify with settings-driven log path).
      Both pass SDK v1 validation and have all required fields."

  - "All 8 built-in module templates (obsidian, auto-schedule, security,
    remember, ntfy, ship, openclaw, telegram) carry schema_version 1 and
    pass validate_manifest."

