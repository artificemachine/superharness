## Key Design Decisions
- **Atomic Claim Pattern:** `inbox_dao.claim_next` uses a single `UPDATE ... RETURNING` query to ensure exactly-once dispatch without needing file-system locks.
- **Optimistic Concurrency:** `tasks_dao` uses a `version` column to prevent lost updates during concurrent edits by multiple agents.
- **Migration Isolation:** `migrate_all_to_sqlite` supports an optional `workers_root` to allow isolated unit testing without touching the developer's real `~/.superharness-workers/`.
- **Reconciled DB:** Both the new ledger state and the existing `review_store` now reside in `.superharness/state.sqlite3`.

## Deviations from Spec
- **Dependency on `ledger_dao` in Migration:** Migration errors are now proactively recorded in the `ledger` table for better auditability, which required creating `ledger_dao` earlier than planned.
- **Typing:** Added `# type: ignore[import-untyped]` for the `yaml` library as per the "no new dependencies" rule (which precluded installing `types-PyYAML`).

