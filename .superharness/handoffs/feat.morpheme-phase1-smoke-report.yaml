outcome: |
  Morpheme Phase 1 integration complete. Dashboard now includes a dedicated
  Morpheme section that renders visible todo task nodes from the live
  superharness project with project name prominently displayed in the header.

implementation: |
  - Added /api/morpheme endpoint in dashboard-ui.py that:
    - Reads contract.yaml from the project .superharness/ directory
    - Filters tasks with status=todo
    - Returns project name, task count, and todo task array (id, title, owner, effort, blocked_by)

  - Added Morpheme card section in dashboard.html:
    - Header displays "Morpheme — <PROJECT_NAME>" with project name in green
    - Shows count of todo tasks in header
    - Grid layout renders each todo task as a visual node with:
      - Task ID (monospace, muted color)
      - Task title (bold, readable)
      - Owner badge (@owner)
      - Effort indicator (low/medium/high)
      - Blocked-by warning if present

  - Added CSS styling for morpheme-node class:
    - Green border with gradient effect
    - Card-based layout with hover effects
    - Responsive grid (auto-fill, min 220px)

  - Added refreshMorpheme() JavaScript function:
    - Fetches /api/morpheme every 5 seconds
    - Updates project name and task count
    - Renders todo nodes dynamically
    - Handles error states

