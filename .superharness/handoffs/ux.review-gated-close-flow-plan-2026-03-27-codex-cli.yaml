task: ux.review-gated-close-flow
phase: plan
status: plan_proposed
from: codex-cli
to: owner
date: 2026-03-27T20:29:29Z
plan: |
  Change the monitor UI review/close workflow so `report_ready` tasks present a
  clear review-first action instead of showing `Request Opus Review` and
  `Accept & Close` as equal peers. The goal is to make review the explicit
  primary path and reserve close for either a passed review or an intentional
  bypass path.

  1. Reproduce the current ambiguity in tests.
     - Add failing tests around `report_ready` task action rendering.
     - Pin the desired behavior: review-first action, generic or provider-aware
       review labeling, and no ambiguous immediate close as a co-equal primary
       action.

  2. Patch the monitor UI action mapping and labels.
     - Update `monitor-ui.py` so the `report_ready` state offers a clearer
       review action (`Request Review` or provider-aware label) instead of
       hardcoded `Request Opus Review`.
     - Gate `Accept & Close` behind `review_passed`, or expose a clearly named
       bypass path such as `Close Without Review` if the current workflow needs
       to preserve an operator override.

  3. Align wording with the actual backend state machine.
     - Ensure button labels match real transitions:
       `report_ready -> review_requested -> review_passed/review_failed -> done`
     - Update docs/tests only as needed to keep the behavior explainable.

tdd:
  red: |
    - Add a failing test proving `report_ready` no longer renders the old
      ambiguous `Request Opus Review` + `Accept & Close` pairing as equal
      primary actions.
    - Add a test for the new review-first button wording.
    - Add a test showing close is available only after `review_passed` or via
      an explicitly named bypass path.
  green: |
    - Patch `monitor-ui.py` action rendering and labels for `report_ready` and
      any related follow-on states.
    - Preserve backend transitions while making the UI intent explicit.
  refactor: |
    - Extract lifecycle-action policy and reviewer label text into a clearer
      mapping/helper so state/action drift is less likely.

risks: |
  - The current backend may still assume operator close is always available from
    `report_ready`, so the UI change must either keep an explicit bypass action
    or be paired with a backend policy change.
  - Provider-aware review wording should not overpromise a specific reviewer
    model unless the runtime actually knows and enforces it.
