task: feat-audit-self
phase: plan
status: plan_proposed
from: gemini-cli
to: owner
date: "2026-05-08T12:00:00Z"
plan: |
  Implement a comprehensive self-audit command ('shux audit-self' or similar) that validates the codebase health, security, and protocol compliance of the superharness project itself. Inspired by the 'ship-check' workflow, this command will verify SQLite-only data access patterns (ensuring no unauthorized raw YAML reads of state files exist), enforce centralized logging compliance across all modules, and validate CHANGELOG.md append-only rules. It acts as a pre-commit or pre-ship governance gate.
tdd:
  red: Add failing tests in 'tests/unit/test_audit_command.py' that run the 'audit-self' command against mock source files containing known violations (e.g., unauthorized 'yaml.safe_load' on state files, missing 'get_logger' usage).
  green: Implement 'src/superharness/commands/audit_self.py' that performs the AST/regex scans across the 'src/' directory to enforce these rules and returns a non-zero exit code on violations. Register it in 'src/superharness/cli.py'.
  refactor: Abstract the codebase scanning logic into reusable validator functions within a new 'src/superharness/engine/audit_rules.py' module to separate the CLI output formatting from the actual static analysis.
risks: Codebase static analysis (even via regex) can be brittle and produce false positives. We must carefully scope the YAML-read checks to ignore valid use cases (like exporting state or parsing test fixtures) and focus strictly on unauthorized state-reading paths.
