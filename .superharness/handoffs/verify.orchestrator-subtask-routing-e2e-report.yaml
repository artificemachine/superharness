  Verified orchestrator --orchestrate flag, subtask routing, and cost estimation
  for superharness v1.3.0. All 6 acceptance criteria confirmed via source inspection
  and 38 passing tests.

acceptance_criteria_results:
  - criterion: delegate --orchestrate decomposes a task into subtasks and writes them to contract.yaml
    result: PASS
    evidence: >
      delegate.py:549-560 — when orchestrate=True and target=="claude-code", creates
      Orchestrator, calls .decompose(), then _write_subtasks_to_contract() writes
      subtasks + cost fields to contract.yaml. Confirmed by
      test_delegate_orchestrator.py::TestWriteSubtasksToContract (3 tests PASS) and
      TestOrchestrateMode::test_orchestrate_flag_triggers_decomposition (PASS).

  - criterion: Each subtask has model_tier (mini/standard/max), estimated_tokens, estimated_cost_usd
    result: PASS
    evidence: >
      orchestrator.py:206-213 validates tiers; fallback ensures estimated_tokens.
      _write_subtasks_to_contract() writes subtasks list including model_tier,
      estimated_tokens, estimated_cost_usd fields. test_subtask_tiers_preserved +
      test_cost_fields_written both PASS.

  - criterion: estimate_subtask_cost() returns correct USD for mini/standard/max tiers
    result: PASS
    evidence: >
      cost_estimator.py:44-65 — uses PRICING (imported from sdk_runner) to compute
      cost = (input_tokens/1M * input_price) + (output_tokens/1M * output_price).
      Tests: test_haiku_cost (< $0.05 for 10k tokens), test_sonnet_cost,
      test_opus_cost (> $0.50 for 50k tokens), test_opus_more_expensive_than_sonnet,
      test_haiku_cheaper_than_sonnet, test_custom_io_ratio — all 7 PASS.

  - criterion: estimate_task_cost() sums subtask estimates with configurable buffer
    result: PASS
    evidence: >
      cost_estimator.py:68-101 — sums individual CostEstimate.estimated_cost_usd,
      applies budget_buffer multiplier (default 1.5). Tests: test_multiple_subtasks_sum
      (abs diff < 0.001), test_budget_has_buffer (1.5x approx), test_custom_budget_buffer
      (2.0x approx), test_empty_subtasks (returns 0.0) — all PASS.

  - criterion: PRICING table in cost_estimator matches MODEL_PRICING in sdk_runner (single source of truth)
    result: PASS
    evidence: >
      cost_estimator.py:10 — `from superharness.engine.sdk_runner import MODEL_PRICING as PRICING`
      Single import, no duplicate table. test_all_models_have_pricing confirms
      {claude-opus-4-6, claude-sonnet-4-6, claude-haiku-4-5-20251001} with correct
      prices (opus $15/$75, sonnet $3/$15, haiku $0.25/$1.25) — PASS.

  - criterion: Orchestrator falls back to single-subtask when Opus decomposition JSON is malformed
    result: PASS
    evidence: >
      orchestrator.py:196-204 — json.JSONDecodeError triggers _fallback_subtask(),
      which returns single subtask with model_tier="standard", id="<task_id>.0",
      estimated_tokens=50000. test_decompose_fallback_on_bad_json ("not valid json {{{")
      and test_decompose_fallback_on_empty_subtasks ({"subtasks": []}) — both PASS.

