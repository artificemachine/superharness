context: |
  The implementation was already present in dashboard-ui.py (lines 3025-3131)
  and the test file was pre-written. This session confirmed the code satisfies
  all acceptance criteria by running the full test suite (GREEN).

  Key implementation details for future reference:
  - _get_installed_version(): importlib.metadata.version("superharness"), returns
    "unknown" on any exception - safe for watchdog context
  - _append_ledger(): opens ledger.md in append mode, swallows all exceptions so
    ledger writes never crash the watchdog
  - autohealth_loop(): tracks running_version from the last-known installed version,
    compares against _get_installed_version() every sleep(interval) tick; on
    mismatch increments restart counter, writes ledger, calls _restart_proc(),
    updates running_version, and continues
  - _restart_proc(): terminates existing process (with 5s wait), starts fresh
    subprocess using sys.executable and --no-open flag

  The feature is activated via the --autohealth flag when launching dashboard-ui.py.
