task: watcher-timeout-and-lock-guard
contract_id: v08-reliability
completed_by: claude-code
completed_at: 2026-03-10T14:40:00Z
status: done

summary: |
  Added launcher timeout and stale lock auto-break to the watcher pipeline.

changes:
  - file: scripts/inbox-dispatch.sh
    what: |
      Added --launcher-timeout SECONDS option (default: 0 = no timeout).
      Uses a portable perl wrapper (run_with_timeout) that forks the launcher
      into its own process group and sends SIGTERM to the entire group on alarm.
      Returns exit code 124 on timeout (matches GNU timeout convention).
      Emits "Launcher timed out after Ns" to stderr and marks inbox item failed.
  - file: scripts/inbox-watch.sh
    what: |
      Added --launcher-timeout SECONDS passthrough to inbox-dispatch.sh.
      Added --lock-stale-minutes N option (default: 30). Before acquiring the
      watcher lock, checks if the lock directory is older than the threshold
      using stat (supports both macOS and GNU/Linux). Auto-removes stale locks
      and logs the action. Setting --lock-stale-minutes 0 disables auto-break.
  - file: tests/unit/test_inbox_dispatch.py
    what: |
      Added 3 tests: timeout kills hung launcher and marks failed,
      zero timeout means no timeout, invalid timeout rejected.
  - file: tests/unit/test_inbox_watch_lock.py
    what: |
      Created new test file with 5 tests: stale lock auto-break,
      fresh lock respected, auto-break disabled with zero,
      launcher-timeout passthrough, invalid lock-stale-minutes rejected.

decisions:
  - id: perl-timeout-wrapper
    what: "Used perl alarm+fork+process-group instead of GNU timeout"
    why: "macOS does not ship GNU timeout (coreutils); perl is universally available"
    alternatives: ["brew install coreutils + gtimeout", "bash background+sleep watchdog"]

