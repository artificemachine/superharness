  - os.kill(pid, SIGTERM) is used; ProcessLookupError is handled gracefully
  - Count of killed processes is always printed
  - "shux monitor-list" hint appears both on successful kill and on no-processes-found path

  Tests patched _find_monitor_processes and os.kill to avoid touching real processes.
