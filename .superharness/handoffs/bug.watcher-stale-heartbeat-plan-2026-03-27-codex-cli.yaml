task: bug.watcher-stale-heartbeat
phase: plan
status: plan_proposed
from: codex-cli
to: owner
date: 2026-03-27T20:08:31Z
plan: |
  Fix the watcher health mismatch that currently shows a stale heartbeat and
  "not running" runtime state even when the launchd watcher is loaded for the
  project. Keep scope limited to watcher health detection and stale-lock /
  heartbeat reconciliation; do not mix in the separate monitor single-instance
  work.

  1. Reproduce and pin the current failure mode in tests.
     - Capture the mismatch between launchd-loaded watcher state, stale
       heartbeat status, and monitor API runtime reporting.
     - Cover the stale lock case described in the 2026-03-27 handoff so the
       fix closes the known regression path instead of only today's symptom.

  2. Patch watcher state detection and stale-lock handling.
     - Inspect `status.py`, `inbox_watch.py`, and any runtime helper used by
       `monitor-ui.py` to determine watcher liveness.
     - Reconcile "loaded/idle" vs "not running" reporting so a healthy
       timer-based watcher is not misclassified.
     - Ensure stale watcher locks cannot leave heartbeat freshness falsely
       stale after recovery.

  3. Verify through CLI and monitor-facing paths.
     - `shux status` should report a healthy watcher after a successful cycle.
     - `/api/status` should agree on watcher runtime / heartbeat state.

tdd:
  red: |
    - Add a unit test for stale heartbeat + healthy launchd/runtime state
      mismatch in status reporting.
    - Add a unit/integration test for stale watcher lock recovery so old lock
      artifacts do not leave the watcher permanently "stale".
    - Add a monitor-facing test that `/api/status` runtime reporting matches
      the underlying watcher health for a loaded idle watcher.
  green: |
    - Patch watcher status/runtime detection to treat timer-driven idle state as
      healthy when appropriate instead of "not running".
    - Patch stale-lock / heartbeat reconciliation so a recovered watcher
      refreshes health correctly.
    - Keep the fix narrow to watcher diagnostics and recovery behavior.
  refactor: |
    - Extract or tighten shared watcher-health helpers if duplicate logic exists
      between CLI status and monitor API paths.
    - Improve status text so the next operational step is obvious when watcher
      health is actually degraded.

risks: |
  - launchd timer semantics may intentionally look "not running" between runs,
    so the fix must distinguish idle timer behavior from an actually dead
    watcher.
  - The stale heartbeat may be a symptom of multiple issues (lock cleanup,
    heartbeat write timing, or runtime-state inference), so tests must isolate
    each one to avoid a partial fix.
