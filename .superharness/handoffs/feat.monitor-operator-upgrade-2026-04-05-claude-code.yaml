context: |
  The monitor-ui.py is a self-contained single-file Python HTTP server with
  embedded HTML/CSS/JS. The board view uses CSS grid (5 equal columns) — no
  external frontend framework required. The /api/board endpoint is GET-only
  (no auth required, read-only like /api/status). Agent health pills are
  populated from the existing _agent_status_health() which uses the heartbeat
  contract v1 module (falls back gracefully if unavailable).

  The blocked_by: feat.heartbeat-contract-v1 dependency means agent_status
  pills may show no agents until that task is complete — the fallback
  {"agents": {}} ensures the board renders cleanly in the interim.

