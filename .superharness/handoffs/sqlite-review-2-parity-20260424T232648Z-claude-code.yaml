  - Close B1, B2, B3, B4, B5 before proceeding to iter 12 (CLI audit).
  - Address F6 and F7 in the same pass — they are spec-level parity
    requirements, not nice-to-have.
  - F1, F2, F3, F4, F5 can land in a follow-up commit but not past
    Gate 3.
  - Run the 24h soak on the superharness repo AFTER the fixes.
    Attach the 5-min drift log to the next review handoff.
