reviewer_notes: |
  The engineering is competent — atomic claim pattern in inbox_dao,
  Z-suffix bug caught in get_stale, WAL enabled everywhere, migrations
  keyed by PRAGMA user_version. Tests are thorough at the DAO layer
  (69–89 pass cleanly). The parity and heal primitives exist; they just
  do not yet deliver the guarantee the gate is asking for.

  The single most important finding is B2 (subtask drift is guaranteed).
  That one is not a race or a rare edge case — it will occur on the
  very first orchestrator call on this branch and every one after it,
  until fixed. Everything else is secondary to closing that.

  Recommend a gate re-submission after B1–B5 close + F6/F7 address +
  24h soak. Do NOT treat any of iter 4–11 as "done" until this gate
  passes.
