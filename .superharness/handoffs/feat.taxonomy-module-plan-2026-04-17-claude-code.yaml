plan: |
  Create `src/superharness/engine/taxonomy.py` as the single source of truth
  for effort levels, model tier mapping, and classifier heuristics. Migrate
  the seven sites that currently hold duplicate or inconsistent copies of
  these constants to import from the new module.

  Reference: `docs/plan-effort-taxonomy-opus47-morpheme.md` §7.2 (file-touch
  enumeration) and §3.1.1 (`EFFORT_TO_TIER_VERSION` canonical mapping).

  Pure refactor. No runtime behaviour change. Rule: existing test suite
  must stay green after each migration step.

  Exported constants:
    - VALID_EFFORTS        = ("low", "medium", "high", "xhigh", "max")
    - EFFORT_ORDER         = list form, ascending (for retry escalation)
    - EFFORT_TO_TIER_VERSION  = dict effort -> (tier, version)
    - DEFAULT_MODEL_PER_EFFORT = dict effort -> full model id
    - DEFAULT_TIMEOUT_PER_EFFORT = dict effort -> minutes
    - OPUS_KEYWORDS        = frozenset of title/context trigger words

  Seven migration sites (IMPORT only; no semantic change yet):
    1. `src/superharness/commands/task.py`          (VALID_EFFORTS literal)
    2. `src/superharness/commands/delegate.py`      (choices list)
    3. `src/superharness/commands/auto_dispatch.py` (effort_order + choices)
    4. `src/superharness/engine/model_router.py`    (VALID_EFFORTS set)
    5. `src/superharness/engine/validate.py`        (_VALID_EFFORTS set)
    6. `src/superharness/engine/schemas.py`         (Profile.default_effort Literal)
    7. `protocol/templates/profile.schema.yaml`     (values: list — YAML, not Python)

  Scope boundaries:
    - Add `xhigh` to the literal sets so downstream tests for sub-plans 2–7
      can assert on it — but do NOT enable `xhigh` in any runtime dispatch
      logic yet.
    - Do NOT touch the adapter manifest (sub-plan 2's job).
    - Do NOT touch classifier logic or heuristic dispatch (sub-plan 4's job).
    - Do NOT touch the orchestrator prompt (sub-plan 5's job).

