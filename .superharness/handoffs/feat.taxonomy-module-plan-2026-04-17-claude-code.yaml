      6. `engine/schemas.py` — widen `Profile.default_effort` from
         `Literal["low","medium","high"]` to a runtime-validated `str`
         that checks `in VALID_EFFORTS` via a pydantic validator. Preserves
         schema strictness without duplicating the effort list.
      7. `protocol/templates/profile.schema.yaml` — YAML file, not Python.
         Update the `values:` list for `default_effort` to
         `[low, medium, high, xhigh, max]`. Source-of-truth note in a
         YAML comment pointing back to `engine/taxonomy.py`.

    After each migration:
      - Run `pytest tests/ -q` — must stay fully green.
      - Run `grep -rn "VALID_EFFORTS" src/` and confirm only
        `engine/taxonomy.py` holds the literal; other sites only reference
        it via import.

    Add an entry to `CHANGELOG.md` under the current version section:
      - `chore(taxonomy): central effort taxonomy module; adds xhigh effort
         level (accepted but not yet wired to model selection — sub-plan 4)`

risks: |
  - `profile.schema.yaml` is YAML, not Python. Migration is a values-list
    edit, not an import. The "single source of truth" invariant is
    documented via comment, not enforced at runtime; future drift is
    possible and will only be caught by a hygiene check (out of scope here).

  - `engine/schemas.py` currently uses a `Literal[...]` type on
    `Profile.default_effort`. Widening to runtime-validated `str` changes
    the static type surface for any downstream pyright/mypy consumer.
    Intended trade-off: one source of truth beats strict typing on a list
    that changes yearly.

  - `commands/delegate.py` and `engine/model_router.py` currently cap at
    three levels (`low|medium|high`). Widening their accepted inputs to
    five levels means a dispatch with `--effort xhigh` will succeed at the
    CLI layer but fall through to legacy model selection in sub-plan 4
    territory. Mitigation: emit a `TODO(sub-plan-4)` log line when
    effort is `xhigh` or `max` and sub-plan 4 has not landed yet. Flag
    in PR description so the operator knows the half-wired state.

  - `auto_dispatch.py` retry ladder change is a behaviour extension
    (one extra retry step). Technically an API surface change even
    though it is additive; CHANGELOG entry is required.

  - Sub-plan 4 depends on `OPUS_KEYWORDS` shape. If the keyword set
    needs richer structure later (e.g. weighted scores, categories),
    we will either extend the module or refactor the API then. YAGNI
    for now — flat frozenset is the right starting point.

