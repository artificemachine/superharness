  refactor: |
    Migrate each of the seven sites in order, one commit per site, with a
    test-suite green check between each:

      1. `commands/task.py` — delete local `VALID_EFFORTS`, import from
         `superharness.engine.taxonomy`. Preserve existing help-text
         content verbatim (already lists low/medium/high/max; append
         `xhigh` if needed, do NOT remove `max`).
      2. `commands/delegate.py` — replace hardcoded `choices=["low","medium","high"]`
         list with `choices=list(VALID_EFFORTS)`. This widens what delegate
         accepts; add a TODO note that runtime behaviour for `xhigh`/`max`
         is sub-plan 4's job.
      3. `commands/auto_dispatch.py` — replace `effort_order` + `choices`
         literals with imports. Retry ladder now has 5 rungs instead of 4;
         this is an intentional capability change (adds one retry step),
         flagged in the CHANGELOG as a non-breaking extension.
      4. `engine/model_router.py` — replace `VALID_EFFORTS = {"low","medium","high"}`
         with import. This expands the classifier's accepted output space;
         since the current prompt only instructs Haiku to reply with
         `low|medium|high`, behaviour is unchanged until sub-plan 4
         updates the prompt.
      5. `engine/validate.py` — replace `_VALID_EFFORTS` set with import.
