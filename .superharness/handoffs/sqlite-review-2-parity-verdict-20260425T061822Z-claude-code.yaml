  not before Gate 2 itself.

  All five blockers from the original review are functionally closed. Two of
  the closures introduced regressions that I caught and fixed in this review
  pass (commit d922652 on top of 109764f). After those fixes:

    - All 13 parity tests pass (4 prior + 9 Gate 2 additions).
    - Doctor parity wiring is live (verified end-to-end on this repo: it
      now reports drift on the live state.sqlite3 instead of silently
      skipping with "state.sqlite not found").
    - shux heal-parity CLI exists, so the hint doctor prints is actionable.
    - Orchestrator decomposition no longer produces permanent F6 mismatched
      drift (status now consistent across YAML and SQLite).

  The 24h soak required by the Gate 2 spec was NOT performed in this review
