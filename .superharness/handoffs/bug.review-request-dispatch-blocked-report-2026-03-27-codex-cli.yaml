outcome: |
  Fixed review dispatch so `review_requested` tasks can be launched for review
  without weakening the normal implementation gate.

  Root cause:
  - the delegate lifecycle gate still only allowed normal implementation
    statuses, so `review_requested` items failed at launch time
  - the live watcher worker was also running a stale copy of the repo shell
    wrappers, so dispatch from launchd kept resolving `python -m superharness`
    against the installed package instead of the updated repo source

  Fixes applied:
  - `delegate` now accepts `review_requested` only when dispatch is explicitly
    marked `--for-review`
  - inbox dispatch detects `review_requested` tasks and adds `--for-review`
    only for those review launches
  - shell wrappers now export repo `src/` on `PYTHONPATH` so repo-run dispatch
    does not silently fall back to the installed package
  - the watcher worker was rebuilt so launchd now uses the updated worker copy

  Live verification:
  - focused tests now pass for the review-dispatch lifecycle path
  - a fresh review request for `ui.monitor-show-reviewer` was enqueued and the
    live watcher moved it to `launched`
  - the newest launcher log now shows normal review launch output instead of
    the old `status is 'review_requested' — plan must be approved` failure

