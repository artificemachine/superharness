task: ui.monitor-left-align-actions
phase: plan
status: plan_proposed
from: codex-cli
to: owner
date: 2026-03-27T20:14:03Z
plan: |
  Adjust the monitor task-list row layout so all task action buttons appear in a
  dedicated left-aligned action group, visually anchored the same way "View
  Report" is today. Keep the change scoped to layout and rendering structure;
  do not change task state transitions or action semantics.

  1. Reproduce the current mixed alignment in tests.
     - Cover the existing inline row renderer that concatenates View Report,
       Enqueue, status badge, title/owner text, and state-specific actions.
     - Pin the expected order and grouping for representative task states.

  2. Patch the task row markup and CSS.
     - Introduce a dedicated actions container at the left side of each task
       row.
     - Keep badge/title/owner metadata separate from the action group so the
       buttons no longer drift to the middle/right of the row.

  3. Verify behavior is preserved.
     - Ensure buttons still fire for todo, plan_proposed, report_ready,
       review_failed, and review_requested flows.
     - Keep "View Report" available and aligned with the rest of the task
       actions.

tdd:
  red: |
    - Add failing tests for task row rendering that assert all action buttons
      are emitted inside a shared left-aligned action container.
    - Add at least one test for a multi-button state (for example report_ready)
      so "View Report" and the state-specific actions stay grouped together.
    - Add a test for a minimal state (for example todo or plan_proposed) to
      ensure the new layout works with a smaller action set too.
  green: |
    - Patch `monitor-ui.py` task row rendering and CSS to emit a dedicated
      left-aligned action block.
    - Update any monitor UI tests that currently assume the old inline string
      concatenation.
  refactor: |
    - Extract small helpers/constants if needed so task action rendering is
      easier to maintain when new buttons are added later.
    - Keep markup readable and avoid spreading layout logic across unrelated
      branches.

risks: |
  - The monitor HTML is built from inline strings, so layout changes can easily
    regress button availability if tests only check text presence and not the
    rendered grouping.
  - Some states render only one or two buttons while others render several; the
    shared left-aligned container must handle both without collapsing spacing.
