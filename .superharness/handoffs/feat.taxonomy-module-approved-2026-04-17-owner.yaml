task: feat.taxonomy-module
phase: plan_approval
status: plan_approved
from: owner
to: claude-code
date: 2026-04-17T00:00:00Z
note: |
  Plan approved after guided walkthrough of 4 load-bearing risks.
  Decisions recorded below — implement exactly as specified.

decisions:
  risk2_literal_widening:
    decision: Option A — widen to str + pydantic validator
    rationale: |
      Dynamic Literal construction is not supported by mypy/pyright at parse time.
      The current Literal["low","medium","high"] is already wrong (missing xhigh/max).
      Runtime validation from VALID_EFFORTS is the correct contract.
    pr_note: "Intentional: static Literal cannot track a runtime-sourced constant set;
      runtime validator is the contract. Note in CHANGELOG."

  risk3_half_wired_efforts:
    decision: Option A — WARNING log + explicit fallback to high
    rationale: |
      Hard errors break agentic pipelines mid-flight.
      xhigh/max are accepted at CLI layer but not yet wired to model selection (sub-plan 4).
      Log at WARNING level (visible in shux output and dashboard logs).
      Explicit fallback to high — not undefined behaviour.
    implementation: |
      In model_router.py (or wherever effort is resolved to a model):
        if effort in ("xhigh", "max"):
            warnings.warn(
                f"effort={effort} not yet wired to model selection "
                "(TODO sub-plan-4 — falling back to high)",
                stacklevel=2,
            )
            effort = "high"
    cleanup: grep TODO(sub-plan-4) when sub-plan 4 lands and remove guard.

  ac4_grep_replaced:
    decision: Replace grep criterion with pytest identity test
    rationale: |
      grep -rn "VALID_EFFORTS" src/ will return 7+ hits after migration because
      import lines also contain the string. Criterion is impossible as written.
      Object identity (is) is the correct semantic check.
    new_test: |
      # in tests/unit/test_taxonomy.py
      def test_valid_efforts_single_source():
          from superharness.engine import taxonomy
          from superharness.commands import task, delegate, auto_dispatch
          from superharness.engine import model_router, validate
          assert task.VALID_EFFORTS is taxonomy.VALID_EFFORTS
          assert model_router.VALID_EFFORTS is taxonomy.VALID_EFFORTS
          assert validate._VALID_EFFORTS is taxonomy.VALID_EFFORTS
          # delegate and auto_dispatch checked via VALID_EFFORTS import identity
    note: grep may still be used as a manual dev sanity check but is not a gate.

  subplan_bundling:
    decision: Keep sub-plans separate — do NOT bundle sub-plan 2 into this PR
    rationale: |
      Sub-plan 1 core constraint is "pure refactor, no runtime behaviour change".
      Sub-plan 2 (adapter manifest + opus-4-7 tier) is a behaviour extension.
      Bundling muddies the PR story and increases blast radius.
      Sub-plan 2 ships as a fast-follow PR after sub-plan 1 merges.

implementation_order:
  1: Write tests/unit/test_taxonomy.py — 14 assertions + test_valid_efforts_single_source (RED)
  2: Create src/superharness/engine/taxonomy.py with 6 constants (GREEN)
  3: Migrate 7 call sites one at a time, pytest green between each (REFACTOR)
  4: Add WARNING guard in model_router for xhigh/max fallback
  5: Append CHANGELOG chore(taxonomy) entry
  6: Open PR — pure refactor label, reference this handoff and plan doc

branch: feat/taxonomy-module
