    - test_todo_already_active_not_doubled: task already pending in inbox is skipped
    - test_todo_blocked_by_not_enqueued: task with unresolved blocked_by is skipped
    - test_todo_blocked_by_done_enqueued: task blocked_by done dep IS enqueued
    - test_max_concurrent_throttle_respected: when active count >= max_concurrent_tasks, nothing new is enqueued
    - test_max_concurrent_partial_fill: when 1 slot remains, only 1 task enqueued out of 3 eligible
    - test_ledger_entry_written: ledger.md gets a dated line after each auto-enqueue
    - test_no_ledger_entry_when_nothing_enqueued: ledger.md unchanged when 0 tasks eligible
    All 9 fail before implementation because auto_enqueue_todo uses the wrong
    filter (autonomy check always skips ai_driven tasks).

  green: |
    Modify auto_enqueue_todo() in src/superharness/commands/inbox_watch.py:
    1. Replace `profile.get("autonomy") != "autonomous"` guard with only
       `not profile.get("auto_dispatch")` — the per-task autonomy filter
       replaces the profile-level autonomy check.
    2. In the task loop, add: `task_autonomy = task.get("autonomy", "ai_driven")`
       and skip if `task_autonomy not in ("ai_driven",)` (matching AC: "ai_driven todo tasks").
    3. Read throttle: `max_concurrent = int(profile.get("max_concurrent_tasks", 0) or 0)`.
       Before appending each item, check `len(active_tasks) + added >= max_concurrent`
       when max_concurrent > 0 and break early.
    4. After writing inbox, call `_append_ledger_line(project_dir, ...)` for each
