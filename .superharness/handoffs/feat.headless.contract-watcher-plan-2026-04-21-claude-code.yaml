risks: |
  - The profile-level autonomy check removal: auto_enqueue_todo previously
    required profile.autonomy == "autonomous" as a safety gate against running
    in non-autonomous projects. The new design relies on task.autonomy instead,
    so projects with auto_dispatch=True but no task.autonomy field will default
    to "ai_driven" (the existing default everywhere else in the codebase). This
    is intentional and consistent with how the auto-approve hook works.
  - max_concurrent_tasks counts active inbox items globally, not per-agent.
    If a project has both claude-code and codex-cli tasks, the cap applies to
    the combined count. Verify this is the intended semantics vs. per-agent cap.
  - ledger.md may not exist in all projects. The helper must silently skip
    rather than fail — same pattern as other optional ledger appenders.
