plan: |
  The function auto_enqueue_todo() already exists in inbox_watch.py (lines
  257-364) and is called on every watcher tick. However it fails all four
  acceptance criteria: (1) it filters by profile.autonomy == "autonomous"
  instead of task-level autonomy == "ai_driven", so eligible tasks are never
  seen; (2) max_concurrent_tasks throttle is not implemented — the function
  enqueues unlimited tasks per tick; (3) ledger.md gets no entry — only a
  print() to stdout; (4) there are zero unit tests for this function (all
  existing tests in test_auto_dispatch.py target auto_enqueue_approved only).

  The implementation changes are contained entirely within auto_enqueue_todo()
  in inbox_watch.py: fix the eligibility filter to read task.autonomy (default
  "ai_driven") instead of profile.autonomy; read profile.max_concurrent_tasks
  and count currently active inbox items before enqueuing to enforce the cap;
  append a dated ledger line for every task enqueued. A small private helper
  _append_ledger_line(project_dir, line) will be extracted so it can be shared
  with auto_enqueue_approved's future ledger support without duplication.

  The new test file tests/unit/test_contract_watcher.py will cover all four
  acceptance criteria with direct unit tests against auto_enqueue_todo(),
  matching the structure of the existing test_auto_dispatch.py. No integration
  or E2E tests are added in this task — the function is already wired into
  _run_scripts() and exercised by the existing watcher integration tests.

tdd:
