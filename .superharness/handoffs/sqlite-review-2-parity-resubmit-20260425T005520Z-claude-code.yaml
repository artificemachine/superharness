  Commit: 109764f — fix(parity): close Gate 2 blockers B1-B5 + F6/F7
  Branch: feat/sqlite-ledger-migration
  Test result: 2182 passed, 47 pre-existing failures (unchanged from baseline)

blocker_fixes:
  B1:
    title: Parity check only covered tasks and inbox
    fix: |
      Added _check_handoffs, _check_failures, _check_decisions to parity.py.
      - Handoffs: compared by (task_id, date) across .superharness/handoffs/*.yaml vs SQLite handoffs table.
      - Failures: compared by (task_id, agent, date) across failures.yaml vs SQLite failures table.
      - Decisions: compared by (agent, task_id, date) across decisions.yaml vs SQLite decisions table.
      check_parity now appends TableDrift for all 5 tables.
    files:
      - src/superharness/engine/parity.py (_check_handoffs, _check_failures, _check_decisions)
    tests:
      - tests/unit/db/test_parity.py::test_parity_covers_handoffs
      - tests/unit/db/test_parity.py::test_parity_covers_failures
      - tests/unit/db/test_parity.py::test_parity_covers_decisions

  B2:
    title: Subtask drift guaranteed every time orchestrator runs
    fix: |
      Chose option (b): parity recurses into nested subtasks.
      - _load_yaml_list gains include_subtasks=True flag that flattens t["subtasks"] lists
        into the returned list alongside top-level tasks.
      - _check_tasks calls _load_yaml_list with include_subtasks=True so parity sees
        subtasks nested under parent in YAML.
      - _sqlite_sync_tasks in contract_io.py extracted a _task_row_from_dict helper and
        now iterates t.get("subtasks") to upsert each subtask as a top-level SQLite row,
        matching what _sqlite_mirror_orchestrate already does.
      Net: write_contract + parity both now treat nested subtasks and top-level tasks
      uniformly in SQLite; no drift on orchestrator calls.
    files:
      - src/superharness/engine/parity.py (_load_yaml_list include_subtasks param, _check_tasks)
      - src/superharness/engine/contract_io.py (_task_row_from_dict, _sqlite_sync_tasks subtask loop)
    tests:
      - tests/unit/db/test_parity.py::test_parity_subtask_nested_in_yaml
      - tests/unit/db/test_parity.py::test_parity_subtask_only_in_db_detected
      - tests/unit/test_contract_io.py::test_write_contract_syncs_subtasks_to_sqlite

  B3:
    title: heal_parity not queue-idempotent
    fix: |
      Added SELECT-before-enqueue dedup in _heal_tasks_db_to_yaml and _heal_inbox:
        SELECT 1 FROM yaml_sync_queue WHERE status='pending' AND op_type=?
        AND json_extract(payload,'$.id')=?
      If a pending op already exists for this row, skip. Second call enqueues 0 ops.
      Renamed old _heal_tasks to _heal_tasks_db_to_yaml for clarity.
    files:
      - src/superharness/engine/parity.py (_heal_tasks_db_to_yaml, _heal_inbox)
    tests:
      - tests/unit/db/test_parity.py::test_heal_parity_is_idempotent

  B4:
    title: contract_io.write_contract not atomic with SQLite sync
    fix: |
      Added _heal_tasks_yaml_to_db to parity.py. When heal_parity finds only_in_yaml > 0
      for the tasks table, it reads all YAML tasks (including subtasks via include_subtasks=True)
      and upserts any that are missing from SQLite directly via tasks_dao.upsert.
      This closes the crash-between-YAML-write-and-SQLite-write gap: the next heal cycle
      will recover the missed SQLite rows from the authoritative YAML.
      Note: write order (YAML first, SQLite second) is unchanged — inverting it is the
      iter-8 / read-cutover step. B4 fix is a safety net for the current dual-write phase.
    files:
      - src/superharness/engine/parity.py (_heal_tasks_yaml_to_db, heal_parity)
    tests:
      - tests/unit/db/test_parity.py::test_heal_parity_yaml_to_db

  B5:
    title: shux doctor did not surface parity or yaml_sync lag
    fix: |
      Added a parity section to doctor.py that:
      - Opens state.sqlite if present
      - Calls check_parity(conn, project_dir)
      - Prints PASS parity: ... (yaml_sync_lag=N) on clean state
      - Prints FAIL parity:<table> only_in_db=N only_in_yaml=N mismatched=N per drifted table
      - Prints WARN parity:yaml_sync_queue lag=N if pending ops > 0
      - Prints FAIL parity:foreign_key_violations=N if FK check fails
      - Increments failures counter so exit code is non-zero on drift
      - Prints INFO if state.sqlite not yet created (not a failure)
    files:
      - src/superharness/commands/doctor.py (parity section before summary)

finding_fixes:
  F6:
    title: Parity did not detect mismatched fields
    fix: |
      _check_tasks and _check_inbox now compute a stable MD5 hash of
      (status, owner, title) and (status, target_agent, task_id) respectively
      for every row in the intersection of DB and YAML sets.
      mismatched is the count of hash mismatches, no longer always 0.
      Added _stable_hash helper using hashlib.md5.
    files:
      - src/superharness/engine/parity.py (_stable_hash, _check_tasks, _check_inbox)
    tests:
      - tests/unit/db/test_parity.py::test_parity_detects_mismatched_fields

  F7:
    title: Orphaned foreign keys not audited
    fix: |
      Added _check_foreign_keys(conn) that runs PRAGMA foreign_key_check and
      returns the row count. Result stored in ParityReport.foreign_key_violations.
      check_parity sets healthy=False if violations > 0.
      doctor.py prints FAIL parity:foreign_key_violations=N when non-zero.
    files:
      - src/superharness/engine/parity.py (_check_foreign_keys, ParityReport.foreign_key_violations)
      - src/superharness/commands/doctor.py
    tests:
      - tests/unit/db/test_parity.py::test_parity_foreign_key_clean

