task: feat.autonomous-peer-review
phase: plan
status: plan_proposed
from: claude-code
to: owner
date: 2026-04-25T08:00:00Z

plan: |
  The codebase already has partial scaffolding: _trigger_auto_review() in inbox_watch.py
  transitions a task from report_ready to review_requested and enqueues peer reviewers.
  The dashboard already maps review_requested to the "review" column. What is missing are
  the five acceptance criteria gaps: cross-pollination guard, model-tier gate, LGTM signal
  path, "Reviewing..." activity-feed label, and full test coverage.

  The plan adds a MODEL_TIER_RANKS dict + reviewer_meets_tier() helper to model_budget.py,
  patches _trigger_auto_review() in inbox_watch.py to filter out the task author and
  any reviewer below the author's model tier, adds a new _auto_close_review_passed()
  cycle function that detects a done reviewer inbox item containing "LGTM" and calls
  close_task(), and maps review_requested events in dashboard-ui.py activity_feed() to
  the label "Reviewing...".

  TDD cycle: write failing tests first (test_peer_review.py new module + extensions to
  test_model_budget.py and test_monitor_ui.py), then implement the minimal changes to make
  them pass, then refactor reviewer selection into a standalone _select_reviewers() function.

tdd:
  red: |
    New file: tests/unit/test_peer_review.py
      - TestCrossPollination::test_author_excluded_from_reviewers
          given author=claude-code, peer_reviewers=[claude-code, codex-cli]
          → only codex-cli is enqueued
      - TestCrossPollination::test_all_reviewers_same_as_author_returns_false
          given author=claude-code, peer_reviewers=[claude-code]
          → _trigger_auto_review returns False, no transition
      - TestModelTierGate::test_reviewer_below_tier_excluded
          given author model=sonnet, reviewer=codex-cli (mini tier)
          → codex-cli filtered from enqueue list
      - TestModelTierGate::test_reviewer_equal_tier_allowed
          given author model=sonnet, reviewer=gemini-cli (sonnet tier)
          → gemini-cli included
      - TestLGTMSignal::test_done_reviewer_item_with_lgtm_triggers_review_passed
          given task in review_requested, inbox item done with outcome containing "LGTM"
          → contract status becomes review_passed → close_task called

    Extend: tests/unit/test_model_budget.py
      - test_model_tier_ranks_ordering: haiku < sonnet < opus
      - test_reviewer_meets_tier_equal_passes
      - test_reviewer_meets_tier_lower_fails
      - test_unknown_agent_defaults_to_standard_tier

    Extend: tests/unit/test_monitor_ui.py
      - test_activity_feed_review_requested_shows_reviewing_label

  green: |
    1. src/superharness/engine/model_budget.py
       Add MODULE_TIER_RANKS dict and AGENT_DEFAULT_TIERS dict.
       Add reviewer_meets_tier(reviewer_agent, author_model, profile) -> bool.

    2. src/superharness/commands/inbox_watch.py — _trigger_auto_review()
       Before enqueue loop: filter reviewers to exclude task owner (cross-pollination)
       and any reviewer failing reviewer_meets_tier() (tier gate).
       Author model sourced from task's model_tier field, falling back to
       AGENT_DEFAULT_TIERS[owner].

    3. src/superharness/commands/inbox_watch.py — new _auto_close_review_passed()
       Scan inbox.yaml for items with matching task_id, status==done, and
       outcome containing "LGTM" (case-insensitive).
       If found and task still in review_requested: transition to review_passed,
       call close_task(skip_verify=True, actor="reviewer").
       Called from _run_watcher_cycle() after _auto_close_report_ready().

    4. src/superharness/scripts/dashboard-ui.py — activity_feed()
       In event-label mapping: if event status == "review_requested", set label to
       "Reviewing...".

  refactor: |
    - Extract reviewer selection into standalone _select_reviewers(task, candidates, profile)
      function in inbox_watch.py for unit-testability without subprocess side-effects.
    - Guard _auto_close_review_passed() behind same auto_close profile flag used by
      _auto_close_report_ready().
    - Add review_passed_at ISO timestamp to contract task on review_passed transition.

risks: |
  1. Author model field: tasks don't always carry model_tier. Fallback to
     AGENT_DEFAULT_TIERS[owner] is assumed acceptable — needs operator confirmation.
  2. LGTM as free-text string is fragile. Structured alternative: reviewer sets
     review_verdict: lgtm field in inbox item outcome YAML. Flag for operator decision
     before green phase starts.
  3. Race condition when two reviewers finish simultaneously — both may attempt close.
     _auto_close_review_passed() must re-check task.status == review_requested inside a
     file lock before calling close_task() to stay idempotent.
  4. codex-cli tier assumption (mini) may be wrong if running a non-default model. Should
     be overridable via profile.yaml agents.codex-cli.model_tier.
