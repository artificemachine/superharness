context: |
  monitor-ui.py is a self-contained single-file Python HTTP server (~2600 lines)
  with embedded HTML/CSS/JS. No external frontend framework is used. All new
  Python functions (board_tasks, review_queue, budget_signals) are pure
  file-read functions with graceful fallbacks when files are missing.

  New GET endpoints (/api/board, /api/review-queue) are read-only and require
  no auth token (consistent with /api/status and /api/inbox).

  The budget_signals() function has two code paths:
    1. Uses superharness.engine.agent_status.read_all_agent_statuses() (preferred)
    2. Falls back to manual YAML glob of .superharness/agents/*.status.yaml

  The board view renders correctly even when contract is empty or missing.
  review_queue urgency ordering: review_failed=0 > report_ready=1 >
  review_requested=2 > review_passed=3.

  The _review_target_for_owner() helper (pre-existing) is reused for cross-agent
  review routing in review_queue items.

