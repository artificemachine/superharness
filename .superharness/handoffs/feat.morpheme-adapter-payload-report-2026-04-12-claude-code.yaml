outcome: |
  Implemented shux adapter-payload --json (v1.16.0) — the stable JSON boundary
  between superharness and Morpheme. Morpheme's adapter.js was already wired and
  waiting for this command; it will now use the native path automatically instead
  of falling back to rawParser.js.

context: |
  This is Phase 2 of the Morpheme integration. Phase 1 (feat.morpheme-phase1-smoke)
  delivered the dashboard Morpheme card. Phase 2 moves all protocol knowledge
  (status mapping, handoff parsing, ledger parsing) into superharness so Morpheme
  becomes a pure renderer.

  Key decisions made:
  - Single file implementation (commands/adapter_payload.py) — no separate adapter/
    package. Consistent with how all other commands are structured.
  - Raw YAML dict loading (not Pydantic schema) — avoids ValidationError on statuses
    not yet in the TaskStatus enum (e.g. review_requested, stopped).
  - Ledger capped at 200 entries newest-first — prevents payload bloat on large projects.
  - Inbox: active items only (pending/launched/running) — done/failed items excluded.
  - dependency: (scalar) normalized to blocked_by: [] (array) in output.

  Morpheme integration path (from adapter.js):
    execSync('shux adapter-payload --json', { cwd: projectPath })
  No --project flag — uses cwd. Our default --project "." handles this correctly.

  Performance: 213ms (module), ~900ms (via shux wrapper / Click import chain).
  Well within Morpheme's 10s execSync timeout.

  Next on Morpheme side:
  1. Run morpheme start against superharness project and verify native adapter path fires
  2. Delete rawParser.js once verified
  3. Simplify watchTargets.js
  4. Merge PR #3 (explore/superharness-gallery) — decide v0.3.0 now or v0.4.0 with adapter

