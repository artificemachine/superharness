position: |
  After directly auditing the codebase at v1.47.0 state, I have a clear position
  on the two highest-value refactors. I'm calling this "partial" because the answer
  depends on which angle you optimise for: correctness risk vs. extensibility.

  My top two picks are:

  1. MANIFEST-DRIVEN ADAPTER ROUTING in delegate.py (eliminate the hardcoded if/elif chain)

  The adapter manifest system (adapter_manifests/*.yaml) already captures
  launcher_script, requires.bin, and model tier mappings for all four adapters.
  Yet delegate.py lines ~940-990 re-implements all of that as a hardcoded
  if/elif chain: if target == "claude-code" ... elif target == "gemini-cli" ...
  elif target == "opencode" ... else (codex-cli). This same pattern is also
  duplicated in auto_dispatch.py (_VALID_AGENTS tuple) and adapter_payload.py
  (enum). v1.47.0 just closed the opencode dispatch gap, which means this chain
  just grew by one more branch. The next adapter addition will grow it further.
  The fix is targeted and bounded: route through adapter_registry.resolve_launcher()
  inside delegate.py's launch path, and derive _VALID_AGENTS from the manifest
  loader rather than a hardcoded tuple. Risk is low because the manifest validation
  already exists; we're not changing behaviour, only the code path that reaches it.

  2. DECOMPOSE _do_dispatch() in inbox_dispatch.py

  At 404 LOC, _do_dispatch() handles item claiming, SQLite/YAML status transitions,
  worktree preparation, launcher invocation, timeout management, and retry logic as
  a single function. v1.46.5 fixed a worktree symlink race and v1.47.0 fixed an
  opencode dispatch gap — both bugs were concentrated in this function. The pattern
  is clear: each dispatch fix requires navigating 400 lines of interleaved concerns,
  which increases the risk of introducing regressions while patching. Splitting into
  four focused units (claim_item, prepare_worktree, run_launcher, record_outcome)
  makes each independently testable and gives future bug fixes a clear surface to
  target. This pairs well with refactor #1: once routing is manifest-driven, run_launcher
  becomes a one-liner.

  I am explicitly NOT recommending SQLite/YAML dual-backend unification as one of
  the two picks. That is a higher-risk, higher-scope undertaking that deserves its
  own tracked task and migration plan. Pulling it into the same sprint as the above
  two risks conflating three different blast radii.

  I am also NOT recommending inbox_watch.py decomposition or dashboard-ui.py
  restructuring at this stage. inbox_watch.py is large (2,873 LOC) but is
  operationally stable; the correct sequence is to fix the dispatch internals first,
  then the watch loop refactor becomes easier. dashboard-ui.py is user-facing and
  changes there need design review, not just refactoring.

points:
  - id: refactor-manifest-driven-routing
    verdict: agree
    rationale: |
      The hardcoded adapter if/elif chain in delegate.py (lines ~940-990) is the
      clearest instance of manifest data being duplicated in imperative code.
      adapter_registry.py already provides resolve_launcher() — using it closes
      the gap. The blast radius is contained to delegate.py and auto_dispatch.py.
      Adding a new adapter should require only a new YAML file, not grep+replace
      across 6 Python files.

  - id: refactor-do-dispatch-decomposition
    verdict: agree
    rationale: |
      _do_dispatch() at 404 LOC with 8+ responsibilities is the root cause of
      the last two patch releases (v1.46.5 worktree race, v1.47.0 opencode gap).
      Decomposing into claim_item / prepare_worktree / run_launcher / record_outcome
      makes the function boundaries match the dispatch protocol stages.
      Each stage then has testable input/output contracts. This is the refactor
      with the highest expected reduction in future bug density per line changed.

  - id: refactor-sqlite-yaml-unification
    verdict: disagree
    rationale: |
      Correct target, wrong sprint. Unifying the SQLite and YAML state paths
      touches inbox_dispatch.py, inbox_watch.py, state_reader.py, state_writer.py,
      inbox_dao.py, and 20+ YAML utility call sites. It is a migration, not a
      refactor, and needs a dedicated task with explicit rollback criteria. Bundling
      it with the above two changes inflates blast radius unnecessarily. Schedule
      it as task ARCH-sqlite-yaml-migration after the dispatch decomposition is merged.

  - id: refactor-inbox-watch-split
    verdict: disagree
    rationale: |
      inbox_watch.py at 2,873 LOC is a valid long-term target, but it is
      operationally stable and its responsibilities (watch loop, heartbeat, GC,
      state sync) are loosely coupled internally. The correct sequencing is:
      dispatch decomposition first (reduces the blast radius inbox_watch.py sees),
      then split the watch loop. Doing it out of order creates merge risk without
      capturing the benefit.

  - id: refactor-dashboard-restructure
    verdict: disagree
    rationale: |
      dashboard-ui.py (3,314 LOC, inline HTML/CSS/JS) is the largest file but
      is user-facing. Restructuring it is a product task (routing, layout, component
      boundaries) as much as a code quality task. It should not be lumped in with
      backend dispatch refactors; it needs its own review and UX sign-off.
