position: |
  I support the same next two refactors the group is converging on, with one sequencing caveat.

  1) Refactor launch routing first: unify delegate.py::_launch_agent and auto_dispatch routing with adapter_registry.resolve_launcher so adapter behavior is manifest-driven in every dispatch path.

  2) Refactor _do_dispatch second: split inbox_dispatch.py::_do_dispatch into staged units with explicit I/O boundaries (claim, prepare context, launch, record/reconcile).

  I do not support broadening this round into a third immediate migration item. SQLite/YAML cleanup is valid architecture work but should be scheduled as the immediate follow-up task (#3) after the two dispatch refactors land.

  On the inbox_watch indentation claim, I do not treat it as a confirmed blocker from the current snapshot; the paused-task reconciliation block appears as a separate top-level try/except. I agree it should be re-validated during implementation PR review, but not used to change next-two prioritization.
