position: |
  Independently audited the HEAD commit (f746e0a, v1.47.5) and the working tree
  diff (+432/-366 lines across delegate.py and inbox_dispatch.py). Cross-referenced
  all three other agent positions and the ARCH maintainability document.

  CONSENSUS ON TWO REFACTORS IS CORRECT — HERE'S WHY:

  The ARCH maintainability document correctly diagnoses the state layer as the root
  architectural debt: state_reader.py still branches between yaml_only, dual (default),
  and sqlite_only modes (61 YAML references). state_writer.py writes YAML first then
  mirrors to SQLite (32 YAML references). The document's recommendation to start with
  state simplification is architecturally sound.

  HOWEVER, an important practical factor changes the sequencing: BOTH proposed refactors
  are already substantially implemented in the working tree. git diff shows:
  - delegate.py: 131 lines changed, _launch_agent already uses resolve_launcher() +
    apply_model_prefix() for the else-branch. Remaining work: remove the named if/elif
    blocks (claude-code, gemini-cli, codex-cli) and route all through the registry.
  - inbox_dispatch.py: 667 lines changed, DispatchContext dataclass + staged helpers
    (_transition_inbox_item, _handle_dispatch_failure, _execute_launcher,
    _finalize_dispatch, _finalize_dispatch_success) already extracted. Remaining work:
    boundary tests and integration verification.

  Given that the work is substantially done and was independently proposed by all four
  agents, the correct course is FINISH AND COMMIT, not restart with a different priority.

  WHY THE CONSENSUS OVERRIDES THE ARCH SEQUENCING — BUT ONLY FOR THIS SPRINT:

  The ARCH document argues that state service should come first because "if [watcher and
  dashboard] are extracted before cleaning the state boundary, complexity will mostly
  move around." This concern applies less to dispatch unification than it first appears:

  1. Dispatch unification (refactor #1) touches only the routing layer — replacing
     if/elif blocks with resolve_launcher(). It does NOT create new state I/O call sites
     or introduce new YAML/SQLite branching. It is purely a routing change and is safe
     to do before or after state service.

  2. _do_dispatch decomposition (refactor #2) DOES create new function boundaries that
     cross the state layer. This IS the concern the ARCH document raises. Mitigation:
     the decomposed stages use the same DAO calls (_claim_next_item, inbox_dao methods)
     that the monolithic _do_dispatch already uses. They do not introduce new state
     access patterns. The decomposition makes state coupling explicit rather than
     implicit, which actually HELPS the subsequent state service refactor.

  CONFIRMED: THE INDENTATION BUG IS FIXED

  The paused dead-pid reconciliation block indentation bug — correctly identified by
  gemini-cli at 14:01Z — was real in v1.47.1. It was fixed in commit 6014f7f at
  2026-05-06T15:23:00Z (v1.47.4) with message "fix(dispatch,watcher): ... paused
  reconciler indent". Both codex-cli (15:54Z) and opencode (now) reviewed the post-fix
  code where the block is correctly aligned at the same indentation as surrounding
  top-level blocks. gemini-cli's finding was correct for the code it reviewed; the fix
  is shipped; zero remaining work. No separate refactor item needed.

  DEFECT SURFACE VALIDATION (all agents correct):

  - delegate.py _launch_agent (lines 490-589): hardcoded if/elif chain for
    claude-code/gemini-cli/opencode/codex-cli confirmed. inbox_dispatch.py:1133 already
    calls resolve_launcher(). Split-brain confirmed by all four agents independently.

  - inbox_dispatch.py _do_dispatch (lines 657-1175, 518 lines): confirmed 8+
