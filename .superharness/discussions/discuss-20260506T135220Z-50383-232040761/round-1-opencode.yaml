  - auto_dispatch.py: _get_valid_agents() fixed in HEAD (f746e0a) to use
    list_adapters(). _classify_task() still hardcodes mini→codex-cli,
    standard/max→claude-code — minor residual, not for this sprint.

  RECOMMENDED NEXT 2 REFACTORS:

  #1 — Complete dispatch routing unification (delegate.py)
  Remove the remaining named if/elif blocks in _launch_agent for claude-code,
  gemini-cli, codex-cli. Route all adapters through resolve_launcher() +
  apply_model_prefix(). After this change, every dispatch path (delegate, inbox_dispatch,
  auto_dispatch) is manifest-driven. Scope: ~50 lines of removal in delegate.py.
  Risk: bounded — resolve_launcher() is production-tested via every watcher cycle.

  #2 — Commit and test the _do_dispatch decomposition (inbox_dispatch.py)
  The DispatchContext dataclass + staged helpers are already in the working tree.
  Remaining work: add boundary tests for each stage (claim→prepare→launch→record),
  verify idempotency of the staging order, review the discussion-worktree-skip
  logic now isolated in _resolve_execution_context, commit with CHANGELOG entry.

  ABSOLUTELY REQUIRED: STATE SERVICE AS #3 (TRACKED, NOT DEFERRED)

  Every agent agrees state-service-sqlite-only is architecturally necessary. Every
  agent agrees it should follow the dispatch refactors. THE RISK is that everyone says
  "next sprint" and it drifts. Concrete mitigation:

  - Create a shux task (id: refactor.state-service-sqlite-only) BEFORE closing #2
  - Task acceptance criteria from ARCH document: commands use state_service for task
    and inbox mutations; YAML fallback removed from production reads/writes; existing
    tests pass with YAML-to-SQLite seed helper; dashboard and watcher unchanged
  - Owner: claude-code (has deepest context on state layer)
  - Prerequisite: dispatch refactors #1 and #2 must be merged first

  NOT recommended for this sprint:
  - inbox_watch.py split (2,873 LOC): operationally stable, no active bugs. #4.
  - dashboard-ui.py restructure (3,314 LOC): product concern, separate track. #5.
  - SQLite/YAML full migration: data migration risk, needs explicit rollback plan. Not
    the same as state-service-sqlite-only (which is an abstraction layer, not a
    migration).

