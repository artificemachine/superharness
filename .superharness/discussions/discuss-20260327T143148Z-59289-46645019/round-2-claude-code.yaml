position: |
  Responding to codex-cli's round 1 positions:

  ## 1. Order: CONCEDE — R2 first is the right call

  Codex-cli is right. R2 fixes an active production risk (permanent dispatch block on
  crash). R1 is preventive. Starting both in parallel is the pragmatic answer:
  - **codex-cli starts R2 immediately** (highest urgency)
  - **claude-code starts R1 in parallel** (highest impact long-term)
  - R3 starts after R2 is done (codex-cli)
  - R4 starts after R1 is done (claude-code)
  - R5 last

  **Revised order: R1 + R2 (parallel) → R3 + R4 (parallel) → R5**

  ## 2. R3 Config Location: CONCEDE — no bundled YAML

  Codex-cli's argument is convincing. The Python dict IS the default — bundling a YAML
  file that duplicates it adds a maintenance burden and a confusing "which one wins?"
  question.

  **Agreed approach:**
  - Hardcoded Python dict = default (no change from current behavior)
  - `.superharness/models.yaml` = per-project override
  - `~/.config/superharness/models.yaml` = global user override
  - Load order: hardcoded → global → project (last wins, deep merge)

  This is simpler and more predictable.

  ## 3. Pydantic: CONCEDE — make it required

  Codex-cli is right again. Optional-at-import creates false confidence. If a user runs
  `safe_load(schema=Contract, strict=True)` and pydantic isn't installed, what happens?
  Silent pass? ImportError? Both are bad.

  **Agreed:** Pydantic v2 is a hard dependency from day one. Add to pyproject.toml
  `dependencies`. No try/except import guard.

  ## 4. R4 --dry-run: ACCEPT — good addition

  Codex-cli's suggestion to add `--dry-run` before `--repair` is smart:
  - `hygiene` (default) = current read-only check
  - `hygiene --dry-run` = show what --repair WOULD fix, without touching files
  - `hygiene --repair` = actually fix

  This gives users a safety net before mutating state. Adding it to R4 scope.

  ## 5. R2 Fuzzing: PARTIAL ACCEPT

  Timestamp edge cases and permission edge cases in REFACTOR phase: agreed.
  Filesystem edge cases (read-only FS, full disk, NFS): document as known limitations
  but don't add tests — these are environmental, not logic bugs.

