position: |
  # Review: canonical is_submitted/register_yaml_submission — v1.62.25

  ## Overall Assessment

  This is a well-scoped fix that directly addresses the core stuck-discussion bug:
  agents write YAML files on disk, but cmd_advance only checked SQLite, making
  YAML-only submissions invisible to the state-machine transition. The dual-registration
  strategy (proactive watcher registration + safety-net reconcile in cmd_advance)
  is architecturally sound. The ~40-line deduplication of YAML-parsing logic into
  the canonical register_yaml_submission() function is clean.

  I rate this PARTIAL because two read-only commands (check_consensus and status)
  still only read SQLite and don't use the is_submitted() fallback — an inconsistency
  that reduces the value of having a single canonical submission check function.

  ## What's Correct

  1. is_submitted() is the right abstraction: DB-first (authoritative), YAML
     fallback (evidence-of-work). All existing inline duplicates are replaced.

  2. register_yaml_submission() is well-defended: idempotent (row-exists check),
     silently skips corrupt YAML, handles missing fields, tries yaml_helpers.safe_load
     first then falls back to yaml.safe_load.

  3. cmd_advance now reconciles before checking completion and reloads rounds
     after reconciliation — the core invariant is restored: check_round returns
     complete=true ONLY when advance can also proceed.

  4. The watcher's _auto_advance_orphaned_rounds proactively registers YAML
     submissions on every poll cycle, closing the race window between agent
     write and operator/timer-triggered advance.

  5. _reconcile_yaml_submissions correctly delegates to register_yaml_submission()
     rather than reinventing parsing — single responsibility.

  6. Test coverage is thorough: 9 regression tests cover the major scenarios
     including the exact stuck-discussion scenario (all YAML, no DB).

  ## Minor Gaps (why verdict is PARTIAL, not AGREE)

  1. cmd_check_consensus does not use is_submitted(). It reads only from
     get_rounds() (SQLite-only). If YAML-only submissions exist but haven't
     been reconciled by the watcher yet, check_consensus will disagree with
     check_round. This is inconsistent with the stated goal of making
     is_submitted() the single canonical submission check.

  2. cmd_status also reads SQLite-only. While low-impact (status is informational),
     an operator calling `shux discuss status` may see an incomplete picture
     if there are YAML submissions not yet registered. Using is_submitted()
     here would provide a consistent view.

  3. cmd_round_context has the same SQLite-only read pattern.

  ## Edge Cases That Are Correctly Handled

  - YAML with different verdict than existing DB row: DB row wins, YAML is
    not registered (idempotency guard).
  - Corrupt YAML: caught in outer try/except, returns False silently.
  - YAML that is valid YAML but not a dict: isinstance check returns False.
  - Missing verdict/position fields: defaults to empty string via .get().
  - Race between watcher and cmd_advance reconcile: both call the same
    idempotent function; first wins, second is no-op.
  - Mixed DB+YAML submissions within same round: both are counted after
    reconciliation.

