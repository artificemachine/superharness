position: |
  Yes, superharness should add auto-archive for closed discussions. The protocol
  already creates durable discussion artifacts and handoffs; archiving closed
  discussions improves day-to-day signal by reducing active-directory noise
  while preserving auditability.

  The feature should be implemented with explicit guardrails:
  1) archive only statuses `consensus`, `no_consensus`, `cancelled`, and
     `failed_participant`;
  2) keep `state.yaml` metadata searchable (or mirrored to an index) so
     monitor/triage remains fast;
  3) keep retention configurable and avoid deleting protocol history by default.
points:
  - id: archive-value
    verdict: agree
    rationale: Closed discussions are historical context, not active work. Moving them out of the active path improves operator focus.
  - id: safety-guardrails
    verdict: agree
    rationale: Archiving must preserve traceability and not hide outcomes needed by contract/hygiene checks.
  - id: implementation-shape
    verdict: agree
    rationale: A simple move-to-archive plus index/update in dispatcher is enough; no complex storage layer is required.
