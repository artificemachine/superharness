position: |
  Auto-closing consensus discussions after user approval is a good idea in
  principle, but the answer depends on what "after user approval" means in
  context. There are two distinct questions here:

  (A) Should discussions that reach consensus auto-close immediately (current
  behavior)? Yes — this is correct for the common case.

  (B) Should some discussions require user approval before the consensus
  close takes effect? Yes — but only as an opt-in mechanism, not a mandatory
  gate on every discussion.

  Current state: `discussion.rb:cmd_advance` (lines 222-227) already sets
  status=consensus and closed_at the moment all agents submit `agree`
  verdicts. This is the right default. The watcher pipeline processes
  dozens of discussions, and adding a mandatory user approval step to every
  consensus would create a bottleneck that defeats the purpose of
  multi-agent automation.

  However, for discussions that gate execution — where the consensus outcome
  triggers code changes, contract task completion, or irreversible actions —
  a user approval step is warranted. The existing approval gate mechanism
  in `discuss.rb:cmd_approve` (lines 122-266) already handles
  `pending_user_approval` → `approved` transitions for handoffs and tasks.
  This pattern should be extended to discussions.

  My position: auto-close on consensus should remain the default. A new
  opt-in `approval_required` field on state.yaml would add a
  `pending_approval` intermediate status between agent consensus and final
  closure. When set, `cmd_advance` would emit `pending_approval` instead of
  `consensus`, and `discussion-dispatch.sh` would skip those discussions
  until the user explicitly approves via `discuss.sh approve`.

  This gives operators a single knob — set at discussion creation time —
  to control the trust level without changing the default fast path that
  works well for low-stakes design discussions and convention alignment.
points:
  - id: auto-close-default
    verdict: agree
    rationale: >
      For most discussions (design debates, convention alignment, review
      coordination), auto-close on consensus is correct and efficient.
      Making user approval mandatory on every discussion would create
      unnecessary friction in the watcher pipeline. The current behavior
      in cmd_advance (lines 222-227) is sound.
  - id: approval-gate-opt-in
    verdict: partial
    rationale: >
      Discussions that gate execution consequences (code changes,
      deployments, contract task status transitions) should support an
      opt-in approval gate. The existing approval gate pattern in
      discuss.rb cmd_approve already handles the state machine for
      pending_user_approval → approved. Extending this to discussions
      is a natural evolution, but it must be opt-in — not mandatory.
      An --approval-required flag at discussion start time is the right
      granularity.
  - id: pending-approval-status
    verdict: agree
    rationale: >
      A new intermediate status (pending_approval) cleanly separates
      "agents reached consensus" from "user approved the consensus."
      This avoids overloading existing active/consensus/no_consensus
      states and makes the approval gate visible in monitor-ui, triage,
      and the discussion list command.
  - id: backward-compatibility
    verdict: agree
    rationale: >
      The default must remain auto-close without approval
      (approval_required defaults to false). This preserves current
      behavior for all existing discussions and scripts. Only
      discussions explicitly started with --approval-required get
      the intermediate gate. No migration needed.
  - id: archive-interaction
    verdict: agree
    rationale: >
      Auto-archive (from the prior auto-archive discussion consensus)
      should only trigger after final status is consensus or
      no_consensus, never on pending_approval. This ensures the
      approval gate and the archive lifecycle don't conflict.
